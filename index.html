<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#fce7f3" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./nurse-avatar.png" />
    <title>พี่พยาบาลแก้วรอบรู้</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Sarabun', sans-serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #c7c7c7; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8; 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "vite": "https://aistudiocdn.com/vite@^7.2.4",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
  }
}
</script>
</head>
  <body>
    <div id="root">
      <style>
        .initial-loader-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: linear-gradient(to bottom right, #eff6ff, #ffffff, #fdf2f8);
          font-family: 'Sarabun', sans-serif;
          margin: 0;
        }
        .heart-loader {
          width: 40px;
          height: 40px;
          background-color: #ec4899;
          position: relative;
          transform: rotate(45deg);
          animation: pulse 1s infinite ease-in-out;
          margin-bottom: 30px;
          box-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
        }
        .heart-loader::before,
        .heart-loader::after {
          content: "";
          width: 40px;
          height: 40px;
          background-color: #ec4899;
          border-radius: 50%;
          position: absolute;
        }
        .heart-loader::before {
          top: -20px;
          left: 0;
        }
        .heart-loader::after {
          top: 0;
          left: -20px;
        }
        @keyframes pulse {
          0% { transform: rotate(45deg) scale(0.8); }
          50% { transform: rotate(45deg) scale(1.1); }
          100% { transform: rotate(45deg) scale(0.8); }
        }
        .loader-text {
          color: #db2777;
          font-size: 1.2rem;
          font-weight: 500;
          animation: blink 1.5s infinite;
        }
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
        }
      </style>
      <div class="initial-loader-container">
        <div class="heart-loader"></div>
        <div class="loader-text">พี่พยาบาลแก้วกำลังมาค่ะ... 💖</div>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
